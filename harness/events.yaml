# ---------------------------------------------------------------------------
# META — game-level lifecycle and pull-mode snapshot
# ---------------------------------------------------------------------------

- id: title_screen_shown
  category: meta
  trigger:
    file: engine/movie/title.asm
    function: DisplayTitleScreen
  payload: {}
  narrative_template: "Title screen displayed."

- id: new_game_started
  category: meta
  trigger:
    file: engine/menus/main_menu.asm
    function: StartNewGame
  payload: {}
  narrative_template: "New game started."

- id: continue_game
  category: meta
  trigger:
    file: engine/menus/save.asm
    function: LoadSAV
  payload: {}
  narrative_template: "Save loaded — continuing."

- id: save_written
  category: meta
  trigger:
    file: engine/menus/save.asm
    function: SaveGameData
  payload:
    play_time_hours: u8     # hPlayTimeHours
    play_time_minutes: u8   # wPlayTimeMinutes
  narrative_template: "Game saved (play time {play_time_hours}:{play_time_minutes})."

- id: oak_speech_done
  category: meta
  trigger:
    file: engine/movie/oak_speech/oak_speech.asm
    function: OakSpeech
  payload: {}
  narrative_template: "Oak's intro speech finished."
  notes: "Emit at the tail of OakSpeech before falling into the player-name prompt."

- id: hall_of_fame_entered
  category: meta
  trigger:
    file: engine/movie/hall_of_fame.asm
    function: AnimateHallOfFame
  payload: {}
  narrative_template: "Entered the Hall of Fame!"

- id: credits_shown
  category: meta
  trigger:
    file: engine/movie/credits.asm
    function: Credits
  payload: {}
  narrative_template: "Credits rolling."

- id: snapshot
  category: meta
  trigger:
    file: home.asm
    function: MainLoop
  payload:
    map_id: u8
    x: u8
    y: u8
    direction: u8
    party_count: u8
    party_species: bytes  # 6 bytes (PARTY_LENGTH); padded with 0xFF
    party_levels: bytes   # 6 bytes
    badges: u8            # wObtainedBadges
    money_low: u8
    money_mid: u8
    money_high: u8
    player_state: u8      # 0=walking, 1=cycling, 2=surfing
    cursor_index: u8      # wCurrentMenuItem — meaningful when a menu is open
    max_menu_item: u8     # wMaxMenuItem — bound for cursor_index in current menu
  narrative_template: "Snapshot: map {map_id} ({x},{y}), party {party_count}, badges 0x{badges:02x}."
  notes: "Pull-mode. Main loop checks wSnapshotRequest each frame; non-zero triggers emit + clear. Full wire payload is 202 bytes — see engine/telemetry/wrappers.asm for the authoritative layout. cursor_index/max_menu_item describe the most recently active menu and are stable across frames once a menu has been opened."
